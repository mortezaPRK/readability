name: Build Artifacts

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag for the release (e.g., v0.1.0 or pr-123)"
        required: true
        type: string
      prerelease:
        description: "Whether this is a pre-release"
        required: false
        type: boolean
        default: false
      release_name:
        description: "Name for the release"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
            artifact: readability-linux-x64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            artifact: readability-linux-arm64
          - os: macos
            arch: arm64
            runner: macos-latest
            artifact: readability-macos-arm64
          - os: windows
            arch: x64
            runner: windows-latest
            artifact: readability-windows-x64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Build CLI
        run: dart compile exe bin/cli.dart -o ${{ matrix.artifact }}
        shell: bash

      - name: Upload to Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name || inputs.version }}
          files: ${{ matrix.artifact }}
          prerelease: ${{ inputs.prerelease }}

  build-js:
    name: Build JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build JS
        run: dart compile js bin/cli.dart -o readability.js

      - name: Upload to Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name || inputs.version }}
          files: readability.js
          prerelease: ${{ inputs.prerelease }}

  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Build WASM
        run: |
          dart compile wasm bin/cli.dart -o readability.wasm

      - name: Upload to Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name || inputs.version }}
          files: readability.wasm
          prerelease: ${{ inputs.prerelease }}
