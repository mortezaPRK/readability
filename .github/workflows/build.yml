name: Build Artifacts

on:
  workflow_call:
    inputs:
      version:
        description: "Version tag for the release (e.g., v0.1.0 or pr-123)"
        required: true
        type: string
      prerelease:
        description: "Whether this is a pre-release"
        required: false
        type: boolean
        default: false
      release_name:
        description: "Name for the release"
        required: false
        type: string
        default: ""
      body:
        description: "Release notes body"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name || inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          body: ${{ inputs.body || format('Release {0}', inputs.version) }}

  build:
    name: Build ${{ matrix.file_name }}
    needs: create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            file_name: readability-wasm.tar.gz
          - runner: ubuntu-24.04
            file_name: readability-js.tar.gz
          - runner: ubuntu-24.04
            file_name: readability_linux-x64
          - runner: ubuntu-24.04-arm
            file_name: readability_linux-arm64
          - runner: macos-15-intel
            file_name: readability_macos-x64
          - runner: macos-15
            file_name: readability_macos-arm64
          - runner: windows-2025
            file_name: readability_windows-x64.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      - name: Build
        run: make build/${{ matrix.file_name }}
        shell: bash
      - name: Upload to Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.release_name || inputs.version }}
          files: build/${{ matrix.file_name }}
          prerelease: ${{ inputs.prerelease }}
