name: Release

on:
  release:
    types: [published]
  push:
    branches: [main]
    paths: [pubspec.yaml]

permissions:
  contents: write
  id-token: write

jobs:
  # Check if we should release (only for push to main)
  check-version:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check version change
        id: check
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version detected: $VERSION"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Extract changelog
        if: steps.check.outputs.should_release == 'true'
        id: changelog
        run: |
          VERSION="${{ steps.check.outputs.version }}"

          # Extract changelog section for this version
          BODY=$(awk "/^## $VERSION/{flag=1; next} /^## [0-9]/{flag=0} flag" CHANGELOG.md)

          # Handle multi-line output
          {
            echo "body<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> $GITHUB_OUTPUT

  # Build artifacts and create release
  build:
    needs: [check-version]
    if: |
      always() &&
      (github.event_name == 'release' ||
       (github.event_name == 'push' && needs.check-version.outputs.should_release == 'true'))
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.event_name == 'release' && github.event.release.tag_name || format('v{0}', needs.check-version.outputs.version) }}
      release_name: ${{ github.event_name == 'release' && github.event.release.name || format('v{0}', needs.check-version.outputs.version) }}
      prerelease: ${{ github.event_name == 'release' && github.event.release.prerelease || false }}
      body: ${{ github.event_name == 'push' && needs.check-version.outputs.changelog || '' }}
